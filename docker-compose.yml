services:
  # User 1 Bot Instance (default)
  bot-user1:
    build:
      context: .
      dockerfile: Dockerfile
    image: sevensplit-v2:${IMAGE_TAG:-latest}
    container_name: sevensplit-user1
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      TRADING_MODE: ${USER1_TRADING_MODE:-REAL}
      UPBIT_ACCESS_KEY: ${USER1_ACCESS_KEY}
      UPBIT_SECRET_KEY: ${USER1_SECRET_KEY}
      UPBIT_OPEN_API_SERVER_URL: ${USER1_UPBIT_OPEN_API_SERVER_URL:-https://api.upbit.com}
      DB_PATH: /app/backend/database/sevensplit.db
      CANDLE_DB_PATH: /app/backend/database/market_data.db
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      # Persist both strategy DB + candle DB + sqlite wal/shm files
      - ./data/user1:/app/backend/database
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

